name: Daily Market Summary

on:
  schedule:
    # 3:30 UTC = 9:00 AM IST. Runs Tue-Sat (UTC) to summarize the prior
    # US session (Mon-Fri respectively) after it has fully closed and
    # settled. Adjust the hour if your local morning differs from IST.
    - cron: "30 3 * * 2-6"
  workflow_dispatch: {}  # lets you click "Run workflow" manually to test

jobs:
  summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: live-scanner   # shares the lock with live_scan.yml so they
      cancel-in-progress: false  # never race on the same state/ files
    steps:
      - name: Checkout this scanner repo
        uses: actions/checkout@v4

      - name: Checkout daily_stock_analysis (your fork)
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.DSA_REPO_PATH }}
          path: daily_stock_analysis

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install scanner dependencies
        run: pip install -r requirements.txt

      - name: Install daily_stock_analysis dependencies
        run: pip install -r daily_stock_analysis/requirements.txt

      - name: Run daily summary
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_MODE: "daily_summary"
          DAILY_SUMMARY_TOP_N: "10"
          DAILY_SUMMARY_DEEP_COUNT: "5"
          DEEP_ANALYSIS_ENABLED: "true"
          DEEP_ANALYSIS_REPO_DIR: "daily_stock_analysis"
          DEEP_ANALYSIS_DAILY_LIMIT: "40"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REPORT_LANGUAGE: "en"
          MARKET_REVIEW_REGION: "us"
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
        run: python scan.py

      - name: Commit updated state
        run: |
          git config user.name "live-scanner-bot"
          git config user.email "actions@github.com"
          if [ -d state ]; then
            git add state/
            git diff --quiet --cached || git commit -m "Update scanner state (daily summary) [skip ci]"
            git push
          else
            echo "No state/ directory yet -- nothing to commit."
          fi
